<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>强势选股 · 板块扫描</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600&display=swap');
  :root {
    --bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--border:#30363d;
    --text:#e6edf3;--muted:#7d8590;
    --green:#3fb950;--green-dim:#0d2318;
    --red:#f85149;--red-dim:#2d0f0f;
    --yellow:#d29922;--yellow-dim:#2a1f05;
    --orange:#f0883e;--orange-dim:#301508;
    --blue:#58a6ff;--blue-dim:#0c1929;
    --mono:'IBM Plex Mono',monospace;--sans:'Noto Sans SC',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;}
  header{border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:stretch;justify-content:space-between;position:sticky;top:0;z-index:100;background:var(--bg);}
  .logo{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text);letter-spacing:.04em;display:flex;align-items:center;gap:8px;}
  .logo span{color:var(--blue);}
  .header-right{display:flex;align-items:center;gap:12px;}
  .meta{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .meta b{color:var(--text);}
  .refresh-btn{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .15s;white-space:nowrap;}
  .refresh-btn:hover{border-color:var(--blue);color:var(--blue);}
  .refresh-btn:disabled{opacity:.45;cursor:not-allowed;border-color:var(--border);color:var(--muted);}
  .refresh-btn.running{border-color:var(--yellow);color:var(--yellow);}
  .refresh-btn.done{border-color:var(--green);color:var(--green);}
  .spin{display:inline-block;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .progress-bar{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--green));transform:scaleX(0);transform-origin:left;z-index:200;}
  .progress-bar.active{animation:progress 180s linear forwards;}
  @keyframes progress{to{transform:scaleX(0.95);}}
  .progress-bar.done{transform:scaleX(1);transition:transform .3s ease;}
  .status-toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--text);box-shadow:0 4px 20px #0008;display:none;z-index:300;max-width:300px;white-space:pre-line;line-height:1.6;}
  .status-toast.show{display:block;}
  .status-toast.yellow{border-color:var(--yellow);}
  .status-toast.green{border-color:var(--green);}
  .status-toast.red{border-color:var(--red);}
  nav{display:flex;align-items:stretch;border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;}
  .tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;user-select:none;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text);border-bottom-color:var(--orange);}
  .tab-badge{display:inline-block;font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:8px;background:var(--bg3);color:var(--muted);margin-left:5px;vertical-align:middle;}
  .tab-badge.orange{background:var(--orange-dim);color:var(--orange);}
  .tab-sep{width:1px;background:var(--border);margin:8px 0;flex-shrink:0;}
  main{padding:24px;max-width:1440px;margin:0 auto;}
  .view{display:none;}.view.active{display:block;}
  .sector-overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:28px;}
  .overview-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;cursor:pointer;transition:border-color .15s,transform .1s;}
  .overview-card:hover{border-color:var(--blue);transform:translateY(-1px);}
  .overview-card.selected{border-color:var(--blue);background:var(--blue-dim);}
  .ov-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .ov-name{font-size:14px;font-weight:600;}
  .ov-status{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;}
  .ov-status.bullish{background:var(--green-dim);color:var(--green);}
  .ov-status.bearish{background:var(--red-dim);color:var(--red);}
  .ov-status.tangle{background:var(--yellow-dim);color:var(--yellow);}
  .ov-status.unknown{background:var(--bg3);color:var(--muted);}
  .ov-meta{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .ov-meta b{color:var(--text);font-weight:500;}
  .ov-counts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .ov-count-pill{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:3px;}
  .ov-count-pill.up{background:var(--green-dim);color:var(--green);}
  .ov-count-pill.strong{background:#0d1f14;color:#57ab6e;}
  .ov-count-pill.tangle{background:var(--yellow-dim);color:var(--yellow);}
  .ov-count-pill.down{background:var(--red-dim);color:var(--red);}
  .sector-detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .sdh-name{font-size:20px;font-weight:700;}
  .sdh-index{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:auto;text-align:right;}
  .sdh-index b{color:var(--text);}
  .status-groups{display:flex;flex-direction:column;gap:24px;}
  .group-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .group-label{font-size:13px;font-weight:600;letter-spacing:.02em;}
  .group-count{font-family:var(--mono);font-size:11px;padding:1px 7px;border-radius:10px;background:var(--bg3);color:var(--muted);}
  .group-line{flex:1;height:1px;background:var(--border);}
  .group-desc{font-size:11px;color:var(--muted);}
  .stocks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:8px;}
  .stock-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;position:relative;overflow:hidden;transition:border-color .15s,transform .1s;}
  .stock-card:hover{border-color:#444c56;transform:translateY(-1px);}
  .stock-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
  .card-breakout_up{background:#0a1c10;border-color:#2ea04355;}.card-breakout_up::before{background:var(--green);}
  .card-above{background:var(--bg2);}.card-above::before{background:#2ea04350;}
  .card-tangle{background:#181508;border-color:#d2992240;}.card-tangle::before{background:var(--yellow);}
  .card-below_d1{background:#180d0d;border-color:#f8514935;}.card-below_d1::before{background:#f8514870;}
  .card-below_d2{background:#1f0a0a;border-color:#f8514960;}.card-below_d2::before{background:var(--red);}
  .card-name{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-code{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:8px;}
  .card-row{display:flex;justify-content:space-between;align-items:flex-end;}
  .card-close{font-family:var(--mono);font-size:15px;font-weight:500;}
  .card-change{font-family:var(--mono);font-size:14px;font-weight:600;}
  .card-change.pos{color:var(--green);}.card-change.neg{color:var(--red);}.card-change.neu{color:var(--muted);}
  .card-dev-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
  .card-dev-label{font-size:10px;color:var(--muted);}
  .card-dev{font-family:var(--mono);font-size:11px;font-weight:500;}
  .card-dev.pos{color:var(--green);}.card-dev.neg{color:var(--red);}.card-dev.neu{color:var(--muted);}
  .card-streak{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:5px;}
  .card-streak.up{color:#57ab6e;}.card-streak.down{color:#c9504a;}
  .card-dev-badge{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;}
  .card-dev-badge.strong{background:var(--orange-dim);color:var(--orange);}
  .card-dev-badge.warn{background:var(--yellow-dim);color:var(--yellow);}
  .dev-toolbar{display:flex;gap:8px;margin-bottom:18px;align-items:center;}
  .dev-filter-btn{padding:5px 14px;border-radius:5px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--muted);cursor:pointer;transition:all .15s;}
  .dev-filter-btn:hover{color:var(--text);border-color:#555;}
  .dev-filter-btn.active{border-color:var(--orange);color:var(--orange);background:var(--orange-dim);}
  .dev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;}
  .dev-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:14px 16px;border-left-width:3px;}
  .dev-card.strong{border-left-color:var(--orange);background:#150e05;}
  .dev-card.warn{border-left-color:var(--yellow);background:#14110a;}
  .dev-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .dev-name{font-size:13px;font-weight:600;}.dev-code{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .dev-sector{font-size:11px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--muted);}
  .dev-number{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1;margin-bottom:6px;}
  .dev-number.pos{color:var(--green);}.dev-number.neg{color:var(--red);}
  .dev-sub{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .dev-label{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;display:inline-block;margin-top:6px;}
  .dev-label.strong{background:var(--orange-dim);color:var(--orange);}
  .dev-label.warn{background:var(--yellow-dim);color:var(--yellow);}
  .dev-empty{padding:48px 0;text-align:center;color:var(--muted);font-size:13px;}
  #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:14px;color:var(--muted);}
  .spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
  .error-box{padding:60px 0;text-align:center;color:var(--muted);}
  @media(max-width:640px){main{padding:14px;}nav,header{padding:0 14px;}.stocks-grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));}}
</style>
</head>
<body>

<div class="progress-bar" id="progress-bar"></div>

<header>
  <div class="logo"><span>▸</span> 强势板块 · 个股扫描</div>
  <div class="header-right">
    <div class="meta" id="update-meta">加载中...</div>
    <button class="refresh-btn" id="refresh-btn" onclick="triggerRefresh()">
      <span id="refresh-icon">↻</span><span id="refresh-text"> 刷新数据</span>
    </button>
  </div>
</header>

<nav>
  <div class="tab active" data-view="sectors" onclick="switchView('sectors',this)">板块扫描</div>
  <div class="tab-sep"></div>
  <div class="tab" data-view="deviation" onclick="switchView('deviation',this)">
    乖离率预警 <span class="tab-badge orange" id="dev-badge">0</span>
  </div>
</nav>

<main id="app">
  <div id="loading"><div class="spinner"></div><div>正在加载数据...</div></div>
</main>

<div class="status-toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// 配置
// ══════════════════════════════════════════
const WORKER_URL = 'https://stock-trigger.sammyzzh.workers.dev';
// ══════════════════════════════════════════

const STATUS_ORDER = ['breakout_up','above','tangle','below_d1','below_d2'];
const GROUP_CONFIG = {
  breakout_up:{ label:'突破上穿', dot:'#3fb950',   desc:'今日有效上穿20日均线（偏离>+3%）' },
  above:      { label:'持续强势', dot:'#2ea04380', desc:'已连续站在20日均线上方' },
  tangle:     { label:'均线纠缠', dot:'#d29922',   desc:'在均线±3%区间内反复，未有效突破' },
  below_d1:   { label:'跌破第1天',dot:'#f8514880', desc:'今日首次有效跌破20日均线' },
  below_d2:   { label:'跌破第2天',dot:'#f85149',   desc:'连续第2天跌破，第3天将被剔除' },
};

let _data = null;
let _activeSector = 0;
let _devFilter = 'all';
let _polling = null;
let _refreshing = false;

function fmtDev(v){ return (v>=0?'+':'')+v.toFixed(2)+'%'; }
function devCls(v){ return v>0.5?'pos':v<-0.5?'neg':'neu'; }
function fmt(n,d=2){ return n==null?'--':Number(n).toFixed(d); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

let _toastTimer;
function showToast(msg, type='', duration=4000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'status-toast show ' + type;
  clearTimeout(_toastTimer);
  if(duration > 0) _toastTimer = setTimeout(()=>t.classList.remove('show'), duration);
}

function startProgress(){
  const b = document.getElementById('progress-bar');
  b.style.transition = 'none';
  b.style.transform = 'scaleX(0)';
  setTimeout(()=>{
    b.style.transition = '';
    b.className = 'progress-bar active';
  }, 50);
}
function doneProgress(){
  const b = document.getElementById('progress-bar');
  b.className = 'progress-bar done';
  setTimeout(()=>{ b.className='progress-bar'; b.style.transform='scaleX(0)'; }, 800);
}

function setRefreshState(state){
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  const text = document.getElementById('refresh-text');
  if(state === 'idle'){
    btn.disabled=false; btn.className='refresh-btn';
    icon.className=''; icon.textContent='↻'; text.textContent=' 刷新数据';
  } else if(state === 'running'){
    btn.disabled=true; btn.className='refresh-btn running';
    icon.className='spin'; icon.textContent='↻'; text.textContent=' 更新中...';
  } else if(state === 'done'){
    btn.disabled=false; btn.className='refresh-btn done';
    icon.className=''; icon.textContent='✓'; text.textContent=' 已更新';
    setTimeout(()=>setRefreshState('idle'), 3000);
  }
}

let _countdownTimer = null;

function startCountdown(totalSeconds){
  clearInterval(_countdownTimer);
  let remaining = totalSeconds;
  function tick(){
    const min = Math.floor(remaining / 60);
    const sec = remaining % 60;
    const timeStr = min > 0 ? `${min}分${sec.toString().padStart(2,'0')}秒` : `${sec}秒`;
    const tips = [
      '正在抓取六大板块成分股...',
      '正在计算20日均线状态...',
      '正在筛选强势个股...',
      '正在计算乖离率...',
      '数据处理中，马上就好...',
    ];
    const tip = tips[Math.floor((totalSeconds - remaining) / 30) % tips.length];
    showToast(`⏳ ${tip}\n预计还需 ${timeStr}`, 'yellow', 0);
    remaining--;
    if(remaining < 0) clearInterval(_countdownTimer);
  }
  tick();
  _countdownTimer = setInterval(tick, 1000);
}

async function triggerRefresh(){
  if(_refreshing) return;
  _refreshing = true;
  setRefreshState('running');
  startProgress();
  showToast('⏳ 正在连接服务器...', 'yellow', 0);

  try {
    const res = await fetch(WORKER_URL, { method: 'POST' });
    const data = await res.json();

    if(!data.ok){
      throw new Error(`GitHub 返回 ${data.status}`);
    }

    // 预估总时长约8分钟（480秒），启动倒计时
    startCountdown(480);
    const triggerTime = Date.now();
    await pollForCompletion(triggerTime);

  } catch(e) {
    _refreshing = false;
    setRefreshState('idle');
    doneProgress();
    clearInterval(_countdownTimer);
    showToast('❌ 触发失败：' + e.message, 'red', 6000);
  }
}

async function pollForCompletion(triggerTime){
  await sleep(30000);
  let attempts = 0;
  const maxAttempts = 25; // 最多等约12分钟

  _polling = setInterval(async () => {
    attempts++;
    try {
      const res = await fetch(WORKER_URL + '?check=1&t=' + triggerTime);
      const data = await res.json();

      if(data.status === 'success'){
        clearInterval(_polling); _polling=null; _refreshing=false;
        clearInterval(_countdownTimer);
        doneProgress();
        showToast('✅ 数据更新完成，正在加载...', 'green', 3000);
        setRefreshState('done');
        await sleep(2000);
        await loadData();
      } else if(data.status === 'failed'){
        clearInterval(_polling); _polling=null; _refreshing=false;
        clearInterval(_countdownTimer);
        doneProgress();
        showToast('⚠️ 脚本运行失败，请到 GitHub Actions 查看日志', 'red', 8000);
        setRefreshState('idle');
      }
      // 倒计时已经在显示进度，不需要额外提示

      if(attempts >= maxAttempts){
        clearInterval(_polling); _polling=null; _refreshing=false;
        clearInterval(_countdownTimer);
        doneProgress(); setRefreshState('idle');
        showToast('⚠️ 等待超时，请稍后手动刷新页面（F5）', 'red', 8000);
      }
    } catch(e){ console.error('轮询失败', e); }
  }, 30000);
}

function switchView(view, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.dataset.view===view));
}

function stockCard(s){
  const changePct = s.change_pct != null ? s.change_pct : s.deviation;
  const cc = devCls(changePct);
  const dc = devCls(s.deviation);
  const alertBadge = s.deviation_alert
    ? `<div class="card-dev-badge ${s.deviation_alert}">${s.deviation_alert==='strong'?'⚡±50%':'▲±30%'}</div>` : '';
  let streak = '';
  if(s.status==='breakout_up') streak=`<div class="card-streak up">站上第${s.above_streak}天</div>`;
  else if(s.status==='above'&&s.above_streak>1) streak=`<div class="card-streak up">连续${s.above_streak}天</div>`;
  else if(s.status.startsWith('below')) streak=`<div class="card-streak down">跌破第${s.below_streak}天</div>`;
  return `<div class="stock-card card-${s.status}">
    ${alertBadge}
    <div class="card-name">${s.name}</div>
    <div class="card-code">${s.code}</div>
    <div class="card-row">
      <div class="card-close">${fmt(s.close)}</div>
      <div class="card-change ${cc}">${fmtDev(changePct)}</div>
    </div>
    <div class="card-dev-row">
      <div class="card-dev-label">偏离均线</div>
      <div class="card-dev ${dc}">${fmtDev(s.deviation)}</div>
    </div>
    ${streak}
  </div>`;
}

function renderSectorDetail(sector){
  const sLabel={bullish:'多头 ↑',bearish:'空头 ↓',tangle:'纠缠 ~',unknown:'--'}[sector.status]||'--';
  const sColor={bullish:'var(--green)',bearish:'var(--red)',tangle:'var(--yellow)',unknown:'var(--muted)'}[sector.status]||'var(--muted)';
  const indexHtml = sector.close!=null
    ? `指数 <b>${fmt(sector.close)}</b> &nbsp; MA20 <b>${fmt(sector.ma20)}</b> &nbsp; 偏离 <b style="color:${sector.deviation>=0?'var(--green)':'var(--red)'}">${fmtDev(sector.deviation)}</b>`
    : '板块指数数据不足';
  const groups={};
  STATUS_ORDER.forEach(s=>groups[s]=[]);
  sector.stocks.forEach(s=>{if(groups[s.status])groups[s.status].push(s);});
  const groupsHtml=STATUS_ORDER.map(key=>{
    const list=groups[key];
    if(!list.length)return '';
    const cfg=GROUP_CONFIG[key];
    return `<div class="status-group">
      <div class="group-header">
        <div class="group-dot" style="background:${cfg.dot}"></div>
        <div class="group-label">${cfg.label}</div>
        <div class="group-count">${list.length}</div>
        <div class="group-line"></div>
        <div class="group-desc">${cfg.desc}</div>
      </div>
      <div class="stocks-grid">${list.map(stockCard).join('')}</div>
    </div>`;
  }).join('');
  return `<div class="sector-detail-header">
    <div class="sdh-name">${sector.name}</div>
    <div style="font-size:13px;font-weight:600;color:${sColor}">${sLabel}</div>
    <div class="sdh-index">${indexHtml}</div>
  </div>
  <div class="status-groups">${groupsHtml||'<div style="color:var(--muted);padding:20px 0">暂无数据</div>'}</div>`;
}

function overviewCard(sector,idx){
  const sLabel={bullish:'多头',bearish:'空头',tangle:'纠缠',unknown:'--'}[sector.status]||'--';
  const sc=sector.status_counts||{};
  const pills=[
    sc.breakout_up?`<span class="ov-count-pill up">↑突破${sc.breakout_up}</span>`:'',
    sc.above?`<span class="ov-count-pill strong">强势${sc.above}</span>`:'',
    sc.tangle?`<span class="ov-count-pill tangle">纠缠${sc.tangle}</span>`:'',
    (sc.below_d1||0)+(sc.below_d2||0)>0?`<span class="ov-count-pill down">跌破${(sc.below_d1||0)+(sc.below_d2||0)}</span>`:'',
  ].filter(Boolean).join('');
  return `<div class="overview-card${idx===_activeSector?' selected':''}" onclick="selectSector(${idx})">
    <div class="ov-header"><div class="ov-name">${sector.name}</div><div class="ov-status ${sector.status}">${sLabel}</div></div>
    <div class="ov-meta">指数偏离 <b>${sector.deviation!=null?fmtDev(sector.deviation):'--'}</b></div>
    <div class="ov-counts">${pills}</div>
  </div>`;
}

function selectSector(idx){
  _activeSector=idx;
  document.querySelectorAll('.overview-card').forEach((c,i)=>c.classList.toggle('selected',i===idx));
  const d=document.getElementById('sector-detail-content');
  if(d&&_data) d.innerHTML=renderSectorDetail(_data.sectors[idx]);
}

function renderDeviationView(alerts){
  const strongCount=alerts.filter(a=>a.alert==='strong').length;
  const warnCount=alerts.filter(a=>a.alert==='warn').length;
  const filterBar=`<div class="dev-toolbar">
    <div class="dev-filter-btn${_devFilter==='all'?' active':''}" onclick="setDevFilter('all',this)">全部 <span class="tab-badge">${alerts.length}</span></div>
    <div class="dev-filter-btn${_devFilter==='strong'?' active':''}" onclick="setDevFilter('strong',this)">强提醒 ±50% <span class="tab-badge orange">${strongCount}</span></div>
    <div class="dev-filter-btn${_devFilter==='warn'?' active':''}" onclick="setDevFilter('warn',this)">提醒 ±30% <span class="tab-badge">${warnCount}</span></div>
  </div>`;
  const filtered=_devFilter==='all'?alerts:alerts.filter(a=>a.alert===_devFilter);
  if(!filtered.length) return filterBar+'<div class="dev-empty">当前无符合条件的乖离率预警</div>';
  const cards=filtered.map(a=>`<div class="dev-card ${a.alert}">
    <div class="dev-card-top">
      <div><div class="dev-name">${a.name}</div><div class="dev-code">${a.code}</div></div>
      <div class="dev-sector">${a.sector}</div>
    </div>
    <div class="dev-number ${a.deviation>=0?'pos':'neg'}">${fmtDev(a.deviation)}</div>
    <div class="dev-sub">收盘 ${fmt(a.close)} &nbsp; MA20 ${fmt(a.ma20)}</div>
    <div class="dev-label ${a.alert}">${a.alert==='strong'?'⚡ 强提醒 ±50%':'▲ 提醒 ±30%'}</div>
  </div>`).join('');
  return filterBar+`<div class="dev-grid">${cards}</div>`;
}

function setDevFilter(f,el){
  _devFilter=f;
  document.querySelectorAll('.dev-filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('dev-view-inner').innerHTML=renderDeviationView(_data.deviation_alerts);
}

async function loadData(){
  try{
    const res=await fetch(`data.json?t=${Date.now()}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    _data=await res.json();
    document.getElementById('update-meta').innerHTML=
      `<b>${_data.trade_date||'--'}</b> &nbsp; 更新于 <b>${_data.updated_at||'--'}</b>`;
    const alerts=_data.deviation_alerts||[];
    const devBadge=document.getElementById('dev-badge');
    devBadge.textContent=alerts.length;
    if(alerts.length) devBadge.classList.add('orange');
    document.getElementById('app').innerHTML=`
      <div class="view active" data-view="sectors">
        <div class="sector-overview" id="overview-grid">
          ${_data.sectors.map((s,i)=>overviewCard(s,i)).join('')}
        </div>
        <div id="sector-detail-content">${renderSectorDetail(_data.sectors[0])}</div>
      </div>
      <div class="view" data-view="deviation">
        <div id="dev-view-inner">${renderDeviationView(alerts)}</div>
      </div>`;
    const activeTab=document.querySelector('.tab.active');
    if(activeTab){
      const view=activeTab.dataset.view;
      document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.dataset.view===view));
    }
  } catch(e){
    document.getElementById('app').innerHTML=`<div class="error-box">
      <div style="font-size:28px;margin-bottom:10px">⚠</div>
      <div>数据加载失败</div>
      <div style="font-family:var(--mono);font-size:11px;margin-top:8px;color:#555">${e.message}</div>
    </div>`;
  }
}

loadData();
</script>
</body>
</html>
